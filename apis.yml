aid: nimble
name: Nimble
description: >-
  Nimble is a relationship-focused CRM that unifies contacts, communications,
  social profiles, calendar, and email into a single workspace for small
  businesses and sales teams. The platform enriches contact records with
  social and business data, supports pipeline management, group messaging,
  and workflow automation across Microsoft 365 and Google Workspace. Nimble's
  REST API exposes contacts, deals, activities, and tasks via Bearer token
  authentication for building integrations and syncing CRM data.
